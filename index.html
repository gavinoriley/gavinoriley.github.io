        }
        .carousel {
            width: 100vw;
            height: calc(100vw * 3 / 16);
            overflow: hidden;
            position: relative;
        }
        .carousel-inner {
            display: flex;
            animation: scroll 40s linear infinite;
        }
        .carousel-inner img {
            width: calc(100vw / 3);
            height: 100%;
            object-fit: cover;
        }
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-100vw * 11 / 3)); }
